<!DOCTYPE html>

  .key    { color: #d73a49; }
  .str    { color: #22863a; }
  .num    { color: #005cc5; }
  .bool   { color: #e36209; }
  .null   { color: #6f42c1; }
  .punct  { color: #444; }
</style>
</head>

function highlight(obj) {
  const json = JSON.stringify(obj, null, 2);
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],:])/g,
    match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) {
          return `<span class="key">${escHtml(match)}</span>`;
        }
        return `<span class="str">${escHtml(match)}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="bool">${match}</span>`;
      if (/null/.test(match))       return `<span class="null">${match}</span>`;
      if (/[{}\[\],:]/.test(match)) return `<span class="punct">${match}</span>`;
      return `<span class="num">${match}</span>`;
    }
  );
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
